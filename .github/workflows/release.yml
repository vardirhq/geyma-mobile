name: Stable APK release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v0.3.1"
        required: true
        type: string
      prerelease:
        description: "Mark the GitHub release as a pre-release"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      ANDROID_SIGNING_KEY_BASE64: ${{ secrets.ANDROID_SIGNING_KEY_BASE64 }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Checkout release ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate release version
        run: |
          set -euo pipefail
          VERSION_NAME="$(grep -E 'versionName = "' app/build.gradle.kts | sed -E 's/.*versionName = "([^"]+)".*/\1/')"
          EXPECTED_TAG="v${VERSION_NAME}"

          if [ "${RELEASE_TAG}" != "${EXPECTED_TAG}" ]; then
            echo "Release tag ${RELEASE_TAG} does not match app versionName ${VERSION_NAME}."
            echo "Expected tag: ${EXPECTED_TAG}"
            exit 1
          fi

          echo "VERSION_NAME=${VERSION_NAME}" >> "${GITHUB_ENV}"
          echo "APK_NAME=geyma-mobile-${VERSION_NAME}.apk" >> "${GITHUB_ENV}"

      - name: Unit tests
        run: ./gradlew testDebugUnitTest

      - name: Lint
        run: ./gradlew lintDebug

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Require signing secrets
        run: |
          set -euo pipefail
          missing=0
          for name in ANDROID_SIGNING_KEY_BASE64 ANDROID_KEY_ALIAS ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing required secret: ${name}"
              missing=1
            fi
          done
          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi

      - name: Sign release APK
        run: |
          set -euo pipefail
          UNSIGNED_APK="app/build/outputs/apk/release/app-release-unsigned.apk"
          SIGNED_APK="${APK_NAME}"
          KEYSTORE_PATH="${RUNNER_TEMP}/geyma-release.keystore"

          if [ ! -f "${UNSIGNED_APK}" ]; then
            echo "::error::Release APK not found at ${UNSIGNED_APK}"
            find app/build/outputs -type f -name "*.apk" -print || true
            exit 1
          fi

          printf "%s" "${ANDROID_SIGNING_KEY_BASE64}" | base64 --decode > "${KEYSTORE_PATH}"

          APKSIGNER="$(find "${ANDROID_HOME}/build-tools" -name apksigner -type f | sort -V | tail -n 1)"
          "${APKSIGNER}" sign \
            --ks "${KEYSTORE_PATH}" \
            --ks-key-alias "${ANDROID_KEY_ALIAS}" \
            --ks-pass "pass:${ANDROID_KEYSTORE_PASSWORD}" \
            --key-pass "pass:${ANDROID_KEY_PASSWORD}" \
            --out "${SIGNED_APK}" \
            "${UNSIGNED_APK}"

          "${APKSIGNER}" verify --verbose "${SIGNED_APK}"
          sha256sum "${SIGNED_APK}" > "${SIGNED_APK}.sha256"

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: geyma-mobile-release
          path: |
            ${{ env.APK_NAME }}
            ${{ env.APK_NAME }}.sha256

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          FLAGS=()
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.prerelease }}" = "true" ]; then
            FLAGS+=(--prerelease)
          fi

          gh release create "${RELEASE_TAG}" \
            "${APK_NAME}" \
            "${APK_NAME}.sha256" \
            --title "Geyma Mobile ${VERSION_NAME}" \
            --verify-tag \
            --generate-notes \
            "${FLAGS[@]}"
