name: Dev APK release

# Publishes the debug-signed APK to a rolling "dev" pre-release so it can be
# installed directly from the Releases page. Debug builds are signed with the
# runner's throwaway debug key: fine for testing, but a new build may need an
# uninstall of the previous one before it installs.

on:
  workflow_dispatch:
  # workflow_dispatch is only registered once this file reaches the default
  # branch, so also fire on pushes that touch this file — that lets the
  # workflow run straight from a feature branch. To publish a new dev APK
  # from a branch, include any edit to this file in the push.
  push:
    paths:
      - ".github/workflows/dev-release.yml"

permissions:
  contents: write

jobs:
  dev-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Publish rolling dev release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk geyma-mobile-dev.apk
          # Delete the old release and its "dev" tag together. Scoping the tag
          # removal to the release avoids a raw `git push --delete origin dev`,
          # which would also delete a branch named dev if one ever existed.
          gh release delete dev --cleanup-tag --yes || true
          gh release create dev geyma-mobile-dev.apk \
            --title "Geyma Mobile dev build" \
            --notes "Debug-signed APK built from ${GITHUB_SHA}. Testing only — signed with a throwaway debug key, so you may need to uninstall a previous dev build before installing a new one." \
            --prerelease \
            --target "${GITHUB_SHA}"
